name: release

# Builds rlist for Linux and macOS and attaches the binaries to a GitHub
# Release. Trigger by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# (workflow_dispatch builds the artifacts without publishing a release.)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Static musl build: runs on any Linux distro, no glibc needed.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          name="rlist-${GITHUB_REF_NAME}-${{ matrix.target }}"
          bin="target/${{ matrix.target }}/release/rlist"
          mkdir -p "$name/completions"
          cp "$bin" "$name/"
          cp README.md "$name/"
          # Every build here is native to its runner, so the binary can
          # generate its own completion scripts.
          "$bin" completions fish > "$name/completions/rlist.fish"
          "$bin" completions bash > "$name/completions/rlist.bash"
          "$bin" completions zsh  > "$name/completions/_rlist"
          tar czf "$name.tar.gz" "$name"

      - uses: actions/upload-artifact@v4
        with:
          name: rlist-${{ matrix.target }}
          path: "*.tar.gz"
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: Checksums
        run: cd dist && sha256sum *.tar.gz > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
